};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUid = null;
let applyingRemoteData = false;
let syncTimer = null;

const LOCAL_KEY_PREFIXES = ['habitState_', 'weekReview_'];
const LOCAL_KEY_EXACT = ['habitHistoryIndex', 'habitStreak', 'lastStreakDate', 'redeemedTotal', 'redemptionLog'];

function collectAllLocalData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (LOCAL_KEY_EXACT.includes(key) || LOCAL_KEY_PREFIXES.some(p => key.startsWith(p))) {
      data[key] = localStorage.getItem(key);
    }
  }
  return data;
}

function restoreLocalData(data) {
  applyingRemoteData = true;
  Object.keys(data).forEach(key => {
    if (key !== '_updatedAt') localStorage.setItem(key, data[key]);
  });
  applyingRemoteData = false;
}

function setSyncStatus(text) {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = text;
}

function syncToCloud() {
  if (!currentUid || applyingRemoteData) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => {
    const data = collectAllLocalData();
    data._updatedAt = Date.now();
    setSyncStatus('Guardando...');
    db.collection('userData').doc(currentUid).set(data)
      .then(() => setSyncStatus('☁️ Sincronizado'))
      .catch(() => setSyncStatus('No se pudo guardar (revisa conexión)'));
  }, 400);
}

function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Ingresa tu correo y contraseña.';
    errEl.style.display = 'block';
    return;
  }
  auth.signInWithEmailAndPassword(email, password).catch(err => {
    errEl.textContent = traducirErrorFirebase(err.code);
    errEl.style.display = 'block';
  });
}

function handleRegister() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Ingresa tu correo y contraseña.';
    errEl.style.display = 'block';
    return;
  }
  if (password.length < 6) {
    errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
    errEl.style.display = 'block';
    return;
  }
  auth.createUserWithEmailAndPassword(email, password).catch(err => {
    errEl.textContent = traducirErrorFirebase(err.code);
    errEl.style.display = 'block';
  });
}

function handleLogout() {
  if (confirm('¿Cerrar sesión?')) {
    auth.signOut();
  }
}

function traducirErrorFirebase(code) {
  const map = {
    'auth/invalid-email': 'Correo inválido.',
    'auth/user-not-found': 'No existe una cuenta con ese correo.',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/email-already-in-use': 'Ya existe una cuenta con ese correo. Inicia sesión.',
    'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
    'auth/too-many-requests': 'Demasiados intentos. Espera un momento.'
  };
  return map[code] || 'Ocurrió un error. Intenta de nuevo.';
}

function initCloudSync() {
  auth.onAuthStateChanged(user => {
    if (!user) {
      currentUid = null;
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('appContainer').style.display = 'none';
      return;
    }
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    currentUid = user.uid;
    db.collection('userData').doc(currentUid).get().then(doc => {
      if (doc.exists) {
        restoreLocalData(doc.data());
      } else {
        syncToCloud();
      }
      setSyncStatus('☁️ Sincronizado');
      render();
    }).catch(err => {
      setSyncStatus('Sin conexión a la nube (' + err.code + ') — revisa las reglas de Firestore');
      render();
    });
    db.collection('userData').doc(currentUid).onSnapshot(doc => {
      if (!doc.exists) return;
      const remote = doc.data();
      if (remote._updatedAt && remote._updatedAt !== window._lastAppliedUpdate) {
        window._lastAppliedUpdate = remote._updatedAt;
        restoreLocalData(remote);
        render();
      }
    }, err => {
      setSyncStatus('Nube desconectada (' + err.code + ')');
    });
  });
}

function habitMaxPoints(habit) { return habit.subtasks.reduce((sum, s) => sum + s.pts, 0); }

function playSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.connect(gain); gain.connect(audioContext.destination);
    osc.frequency.value = 800; osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
    osc.start(audioContext.currentTime); osc.stop(audioContext.currentTime + 0.1);
  } catch (e) {}
}

function confetti() {
  const colors = ['#C0473F', '#B8862F', '#3B8F5C', '#1D8FA5', '#6E56CF', '#C9781F'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.style.position = 'fixed'; el.style.pointerEvents = 'none';
    el.style.left = Math.random() * 100 + '%'; el.style.top = '-10px';
    el.style.width = '7px'; el.style.height = '7px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius = '50%'; el.style.zIndex = 9999;
    el.style.transition = 'transform 1.3s ease-out, opacity 1.3s ease-out';
    document.body.appendChild(el);
    requestAnimationFrame(() => { el.style.transform = 'translateY(100vh) rotate(360deg)'; el.style.opacity = '0'; });
    setTimeout(() => el.remove(), 1400);
  }
}

function todayKey() { return new Date().toISOString().slice(0,10); }

function getState() {
  const key = todayKey();
  const stored = localStorage.getItem('habitState_' + key);
  return stored ? JSON.parse(stored) : { date: key, subtaskDone: {} };
}

function saveState(state) { localStorage.setItem('habitState_' + state.date, JSON.stringify(state)); }
function getHistory() { const s = localStorage.getItem('habitHistoryIndex'); return s ? JSON.parse(s) : []; }
function saveHistory(dates) { localStorage.setItem('habitHistoryIndex', JSON.stringify(dates)); }
function getStreak() { const s = localStorage.getItem('habitStreak'); return s ? JSON.parse(s) : 0; }
function getRedeemedTotal() { const s = localStorage.getItem('redeemedTotal'); return s ? JSON.parse(s) : 0; }
function getRedemptionLog() { const s = localStorage.getItem('redemptionLog'); return s ? JSON.parse(s) : []; }

function allHabits() { return [...habitsMorning, ...habitsEvening]; }

function allTaskDefs() {
  const defs = [];
  allHabits().forEach(h => h.subtasks.forEach((s, i) => defs.push({ key: h.id + '_' + i, pts: s.pts, optional: s.optional })));
  dailyHabits.forEach(d => defs.push({ key: d.id + '_0', pts: d.pts, optional: false }));
  return defs;
}

function computeDayTotal(state) {
  let total = 0;
  allTaskDefs().forEach(def => { if (state.subtaskDone[def.key] && !def.optional) total += def.pts; });
  return total;
}

function maxDayTotal() { return allTaskDefs().reduce((sum, d) => sum + (d.optional ? 0 : d.pts), 0); }

function getLifetimePoints() {
  const dates = getHistory(); let total = 0;
  dates.forEach(date => { const s = localStorage.getItem('habitState_' + date); if (s) total += computeDayTotal(JSON.parse(s)); });
  return total;
}

function getAvailableBalance() { return getLifetimePoints() - getRedeemedTotal(); }

function markDateTouched(state) {
  const dates = getHistory();
  if (!dates.includes(state.date)) { dates.push(state.date); saveHistory(dates); }
}

function afterToggleEffects(state) {
  const total = computeDayTotal(state); const max = maxDayTotal();
  if (total === max) {
    confetti();
    const lastStreakDate = localStorage.getItem('lastStreakDate');
    if (lastStreakDate !== state.date) {
      localStorage.setItem('habitStreak', JSON.stringify(getStreak() + 1));
      localStorage.setItem('lastStreakDate', state.date);
    }
  }
}

function toggleSubtask(habitId, idx) {
  const state = getState();
  const subKey = habitId + '_' + idx;
  state.subtaskDone[subKey] = !state.subtaskDone[subKey];
  saveState(state);
  const habit = allHabits().find(h => h.id === habitId);
  const sub = habit.subtasks[idx];
  if (state.subtaskDone[subKey] && !sub.optional) playSound();
  markDateTouched(state); afterToggleEffects(state); render(); syncToCloud();
}

function toggleDaily(dailyId) {
  const state = getState();
  const subKey = dailyId + '_0';
  state.subtaskDone[subKey] = !state.subtaskDone[subKey];
  saveState(state);
  if (state.subtaskDone[subKey]) playSound();
  markDateTouched(state); afterToggleEffects(state); render(); syncToCloud();
}

function redeemReward(idx) {
  const reward = rewards[idx];
  const balance = getAvailableBalance();
  if (balance < reward.cost) return;
  if (!confirm('¿Canjear "' + reward.name + '" por ' + reward.cost + ' puntos?')) return;
  localStorage.setItem('redeemedTotal', JSON.stringify(getRedeemedTotal() + reward.cost));
  const log = getRedemptionLog();
  log.unshift({ name: reward.name, cost: reward.cost, date: todayKey() });
  localStorage.setItem('redemptionLog', JSON.stringify(log.slice(0, 20)));
  confetti(); playSound(); renderRecompensas(); syncToCloud();
}

function resetDay() {
  if (confirm('¿Seguro que quieres reiniciar el día de hoy?')) {
    localStorage.removeItem('habitState_' + todayKey()); render(); syncToCloud();
  }
}

function switchTab(tab) {
  ['Hoy','Semana','Historial','Recompensas'].forEach(t => {
    document.getElementById('tab' + t).classList.toggle('active', t.toLowerCase() === tab);
    document.getElementById('view' + t).style.display = t.toLowerCase() === tab ? 'block' : 'none';
  });
  if (tab === 'historial') renderHistory();
  if (tab === 'recompensas') renderRecompensas();
  if (tab === 'semana') renderSemana();
}

function renderHistory() {
  const dates = getHistory().sort().reverse();
  const container = document.getElementById('historyContainer');
  container.innerHTML = '';
  if (dates.length === 0) { container.innerHTML = '<div class="empty-state">Aún no hay registros.</div>'; return; }
  const max = maxDayTotal();
  dates.slice(0, 30).forEach(date => {
    const stored = localStorage.getItem('habitState_' + date);
    if (!stored) return;
    const state = JSON.parse(stored);
    const total = computeDayTotal(state);
    const pct = Math.round((total / max) * 100);
    const d = new Date(date + 'T00:00:00');
    const dateLabel = d.toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' });
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = '<span class="history-date">' + dateLabel + '</span><div class="history-bar-wrap"><div class="history-bar" style="width:' + pct + '%"></div></div><span class="history-pts">' + total + '/' + max + '</span>';
    container.appendChild(row);
  });
}

function renderRecompensas() {
  const balance = getAvailableBalance();
  document.getElementById('balanceValue').textContent = balance;
  const rewardsContainer = document.getElementById('rewardsContainer');
  rewardsContainer.innerHTML = '';
  rewards.forEach((reward, i) => {
    const canAfford = balance >= reward.cost;
    const el = document.createElement('div');
    el.className = 'reward-card';
    el.style.setProperty('--card-color', reward.color);
    el.innerHTML = '<div><div class="reward-name">' + reward.name + '</div><div class="reward-cost">' + reward.cost + ' puntos</div></div><button class="redeem-btn" style="--card-color:' + reward.color + '" ' + (canAfford ? '' : 'disabled') + ' onclick="redeemReward(' + i + ')">Canjear</button>';
    rewardsContainer.appendChild(el);
  });
  const log = getRedemptionLog();
  const logContainer = document.getElementById('logContainer');
  logContainer.innerHTML = '';
  if (log.length === 0) { logContainer.innerHTML = '<div class="empty-state">Todavía no has canjeado nada.</div>'; }
  else {
    log.forEach(entry => {
      const d = new Date(entry.date + 'T00:00:00');
      const dateLabel = d.toLocaleDateString('es-CL', { day: 'numeric', month: 'short' });
      const row = document.createElement('div');
      row.className = 'log-row';
      row.innerHTML = '<span>' + entry.name + ' · ' + dateLabel + '</span><span class="log-cost">-' + entry.cost + '</span>';
      logContainer.appendChild(row);
    });
  }
}

function getISOWeekKey(d) {
  const date = new Date(d.getTime());
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  const weekNum = 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  return date.getFullYear() + '-W' + weekNum;
}

function renderSemana() {
  const today = new Date();
  const last7 = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    last7.push(d.toISOString().slice(0,10));
  }
  const max = maxDayTotal();
  let weekTotal = 0; let daysActive = 0; let daysFull = 0;
  last7.forEach(date => {
    const stored = localStorage.getItem('habitState_' + date);
    if (stored) {
      const total = computeDayTotal(JSON.parse(stored));
      if (total > 0) { weekTotal += total; daysActive++; }
      if (total === max) daysFull++;
    }
  });
  const avg = Math.round(weekTotal / 7);

  document.getElementById('weekSummary').innerHTML =
    '<div class="week-stat"><div class="week-stat-value">' + weekTotal + '</div><div class="week-stat-label">Puntos semana</div></div>' +
    '<div class="week-stat"><div class="week-stat-value">' + avg + '</div><div class="week-stat-label">Promedio/día</div></div>' +
    '<div class="week-stat"><div class="week-stat-value">' + daysFull + '/7</div><div class="week-stat-label">Días 100%</div></div>';

  const weekKey = getISOWeekKey(today);
  const stored = localStorage.getItem('weekReview_' + weekKey);
  if (stored) {
    const review = JSON.parse(stored);
    document.getElementById('reviewWorked').value = review.worked || '';
    document.getElementById('reviewFailed').value = review.failed || '';
    document.getElementById('reviewAdjust').value = review.adjust || '';
  } else {
    document.getElementById('reviewWorked').value = '';
    document.getElementById('reviewFailed').value = '';
    document.getElementById('reviewAdjust').value = '';
  }
  document.getElementById('savedBadge').style.display = 'none';
}

function saveWeekReview() {
  const weekKey = getISOWeekKey(new Date());
  const review = {
    worked: document.getElementById('reviewWorked').value,
    failed: document.getElementById('reviewFailed').value,
    adjust: document.getElementById('reviewAdjust').value
  };
  localStorage.setItem('weekReview_' + weekKey, JSON.stringify(review));
  document.getElementById('savedBadge').style.display = 'block';
  syncToCloud();
}

function renderHabitBlock(habit, container, state) {
  const maxPts = habitMaxPoints(habit);
  let habitPts = 0; let allRequiredDone = true;
  const subtasksHtml = habit.subtasks.map((sub, i) => {
    const subKey = habit.id + '_' + i;
    const done = !!state.subtaskDone[subKey];
    if (done && !sub.optional) habitPts += sub.pts;
    if (!sub.optional && !done) allRequiredDone = false;
    const checkClass = done ? (sub.optional ? 'optional-done' : 'done') : '';
    return '<div class="subtask ' + (sub.optional ? 'optional' : '') + '" onclick="toggleSubtask(\'' + habit.id + '\', ' + i + ')">' +
      '<div class="subtask-check ' + checkClass + '" style="--card-color:' + habit.color + '">' + (done ? '✓' : '') + '</div>' +
      '<span>' + sub.name + (sub.optional ? ' (opcional)' : '') + '</span>' +
      (sub.pts > 0 ? '<span class="subtask-pts">+' + sub.pts + '</span>' : '') +
      '</div>';
  }).join('');

  const el = document.createElement('div');
  el.className = 'habit-item' + (allRequiredDone ? ' completed' : '');
  el.style.setProperty('--card-color', habit.color);
  el.style.setProperty('--card-bg-done', habit.bgDone);
  el.innerHTML =
    '<div class="habit-header"><span class="habit-name">' + habit.name + '</span><span class="habit-points">' + habitPts + '/' + maxPts + '</span></div>' +
    '<div class="habit-anchor">' + habit.anchor + '</div>' +
    '<div class="subtasks">' + subtasksHtml + '</div>';
  container.appendChild(el);
  return habitPts;
}

function render() {
  const state = getState();
  document.getElementById('identityLine').textContent = identityPhrases[new Date().getDay()];

  const morningContainer = document.getElementById('morningContainer');
  morningContainer.innerHTML = '';
  const eveningContainer = document.getElementById('eveningContainer');
  eveningContainer.innerHTML = '';

  let totalPoints = 0;
  habitsMorning.forEach(h => totalPoints += renderHabitBlock(h, morningContainer, state));
  habitsEvening.forEach(h => totalPoints += renderHabitBlock(h, eveningContainer, state));

  const dailyContainer = document.getElementById('dailyHabitsContainer');
  dailyContainer.innerHTML = '';
  dailyHabits.forEach(d => {
    const subKey = d.id + '_0';
    const done = !!state.subtaskDone[subKey];
    if (done) totalPoints += d.pts;
    const el = document.createElement('div');
    el.className = 'daily-card' + (done ? ' completed' : '');
    el.style.setProperty('--card-color', d.color);
    el.style.setProperty('--card-bg-done', d.bgDone);
    el.innerHTML = '<div class="daily-name">' + d.name + '</div><button class="daily-check" style="--card-color:' + d.color + '" onclick="toggleDaily(\'' + d.id + '\')">' + (done ? '✓ +' + d.pts : '+' + d.pts + ' pts') + '</button>';
    dailyContainer.appendChild(el);
  });

  document.getElementById('totalPoints').textContent = totalPoints;
  document.getElementById('streakDays').textContent = getStreak();
  markDateTouched(state);
}

initCloudSync();
</script>
